version: '3.8'

services:
  # L'API FastAPI
  api:
    build: .
    ports:
      - "8000:8000"
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    volumes:
      - .:/app

  # L'Interface Streamlit
  interface:
    build: .
    ports:
      - "8501:8501"
    command: streamlit run app/streamlit_app.py --server.port 8501 --server.address 0.0.0.0
    depends_on:
      - api
    volumes:
      - .:/app